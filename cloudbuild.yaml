steps:
  # 1. Build the Docker image from the cloudrun/ subdirectory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:latest'
      - './cloudrun'

  # 2. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'quantchat-server'
      - '--image'
      - 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/quantchat-server/cloud-run-source-deploy/quantchat-server:latest'

options:
  logging: CLOUD_LOGGING_ONLY